services:
  web:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        BUILD_MAX_OLD_SPACE_SIZE: ${BUILD_MAX_OLD_SPACE_SIZE:-1024}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://tecnolts.com}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
        NEXT_PUBLIC_YANDEX_VERIFICATION: ${NEXT_PUBLIC_YANDEX_VERIFICATION:-}
        NEXT_PUBLIC_YAHOO_VERIFICATION: ${NEXT_PUBLIC_YAHOO_VERIFICATION:-}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
        NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE:-}
        NEXT_PUBLIC_WHATSAPP_PHONE: ${NEXT_PUBLIC_WHATSAPP_PHONE:-}
        NEXT_PUBLIC_WHATSAPP_MESSAGE: ${NEXT_PUBLIC_WHATSAPP_MESSAGE:-}
        NEXT_PUBLIC_CONTACT_LOCALITY: ${NEXT_PUBLIC_CONTACT_LOCALITY:-Quito}
        NEXT_PUBLIC_CONTACT_REGION: ${NEXT_PUBLIC_CONTACT_REGION:-Pichincha}
        NEXT_PUBLIC_CONTACT_COUNTRY_CODE: ${NEXT_PUBLIC_CONTACT_COUNTRY_CODE:-EC}
        NEXT_PUBLIC_CONTACT_COUNTRY_NAME: ${NEXT_PUBLIC_CONTACT_COUNTRY_NAME:-Ecuador}
        NEXT_PUBLIC_CONTACT_STREET_ADDRESS: ${NEXT_PUBLIC_CONTACT_STREET_ADDRESS:-}
        NEXT_PUBLIC_CONTACT_POSTAL_CODE: ${NEXT_PUBLIC_CONTACT_POSTAL_CODE:-}
        NEXT_PUBLIC_CONTACT_LATITUDE: ${NEXT_PUBLIC_CONTACT_LATITUDE:-}
        NEXT_PUBLIC_CONTACT_LONGITUDE: ${NEXT_PUBLIC_CONTACT_LONGITUDE:-}
        NEXT_PUBLIC_GOOGLE_MAPS_URL: ${NEXT_PUBLIC_GOOGLE_MAPS_URL:-}
        NEXT_PUBLIC_GOOGLE_BUSINESS_PROFILE_URL: ${NEXT_PUBLIC_GOOGLE_BUSINESS_PROFILE_URL:-}
        NEXT_PUBLIC_LINKEDIN_URL: ${NEXT_PUBLIC_LINKEDIN_URL:-}
        NEXT_PUBLIC_FACEBOOK_URL: ${NEXT_PUBLIC_FACEBOOK_URL:-}
        NEXT_PUBLIC_INSTAGRAM_URL: ${NEXT_PUBLIC_INSTAGRAM_URL:-}
        NEXT_PUBLIC_X_URL: ${NEXT_PUBLIC_X_URL:-}
        NEXT_PUBLIC_TIKTOK_URL: ${NEXT_PUBLIC_TIKTOK_URL:-}
        NEXT_PUBLIC_YOUTUBE_URL: ${NEXT_PUBLIC_YOUTUBE_URL:-}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      APP_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://tecnolts.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_TLS_SERVERNAME: ${SMTP_TLS_SERVERNAME:-}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
    ports:
      - "${HOST_PORT:-3008}:3000"
    container_name: tecnolts-app
    hostname: tecnolts-app
    networks:
      edge:
        aliases:
          - tecnolts-app
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web-dev:
    profiles: ["development"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3009}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
        NEXT_PUBLIC_YANDEX_VERIFICATION: ${NEXT_PUBLIC_YANDEX_VERIFICATION:-}
        NEXT_PUBLIC_YAHOO_VERIFICATION: ${NEXT_PUBLIC_YAHOO_VERIFICATION:-}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
        NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE:-}
        NEXT_PUBLIC_WHATSAPP_PHONE: ${NEXT_PUBLIC_WHATSAPP_PHONE:-}
        NEXT_PUBLIC_WHATSAPP_MESSAGE: ${NEXT_PUBLIC_WHATSAPP_MESSAGE:-}
        NEXT_PUBLIC_CONTACT_LOCALITY: ${NEXT_PUBLIC_CONTACT_LOCALITY:-Quito}
        NEXT_PUBLIC_CONTACT_REGION: ${NEXT_PUBLIC_CONTACT_REGION:-Pichincha}
        NEXT_PUBLIC_CONTACT_COUNTRY_CODE: ${NEXT_PUBLIC_CONTACT_COUNTRY_CODE:-EC}
        NEXT_PUBLIC_CONTACT_COUNTRY_NAME: ${NEXT_PUBLIC_CONTACT_COUNTRY_NAME:-Ecuador}
        NEXT_PUBLIC_CONTACT_STREET_ADDRESS: ${NEXT_PUBLIC_CONTACT_STREET_ADDRESS:-}
        NEXT_PUBLIC_CONTACT_POSTAL_CODE: ${NEXT_PUBLIC_CONTACT_POSTAL_CODE:-}
        NEXT_PUBLIC_CONTACT_LATITUDE: ${NEXT_PUBLIC_CONTACT_LATITUDE:-}
        NEXT_PUBLIC_CONTACT_LONGITUDE: ${NEXT_PUBLIC_CONTACT_LONGITUDE:-}
        NEXT_PUBLIC_GOOGLE_MAPS_URL: ${NEXT_PUBLIC_GOOGLE_MAPS_URL:-}
        NEXT_PUBLIC_GOOGLE_BUSINESS_PROFILE_URL: ${NEXT_PUBLIC_GOOGLE_BUSINESS_PROFILE_URL:-}
        NEXT_PUBLIC_LINKEDIN_URL: ${NEXT_PUBLIC_LINKEDIN_URL:-}
        NEXT_PUBLIC_FACEBOOK_URL: ${NEXT_PUBLIC_FACEBOOK_URL:-}
        NEXT_PUBLIC_INSTAGRAM_URL: ${NEXT_PUBLIC_INSTAGRAM_URL:-}
        NEXT_PUBLIC_X_URL: ${NEXT_PUBLIC_X_URL:-}
        NEXT_PUBLIC_TIKTOK_URL: ${NEXT_PUBLIC_TIKTOK_URL:-}
        NEXT_PUBLIC_YOUTUBE_URL: ${NEXT_PUBLIC_YOUTUBE_URL:-}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      APP_ENV: development
      NEXT_PUBLIC_APP_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      FRONTEND_DEV_RUNTIME: ${FRONTEND_DEV_RUNTIME:-hot}
      FRONTEND_DEV_BUNDLER: ${FRONTEND_DEV_BUNDLER:-webpack}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3009}
      NEXT_ALLOWED_DEV_ORIGINS: ${NEXT_ALLOWED_DEV_ORIGINS:-localhost,127.0.0.1,192.168.100.229}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_TLS_SERVERNAME: ${SMTP_TLS_SERVERNAME:-}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
    command: >
      sh -lc '
        runtime="$${FRONTEND_DEV_RUNTIME:-hot}";
        bundler="$${FRONTEND_DEV_BUNDLER:-webpack}";
        if [ "$$runtime" = "hot" ]; then
          mkdir -p .next .next/dev .next/cache;
          find .next -mindepth 1 -maxdepth 1 ! -name dev ! -name cache -exec rm -rf {} +;
          if [ "$$bundler" = "webpack" ]; then
            exec npm run dev -- --webpack --hostname 0.0.0.0 --port 3000;
          fi;
          exec npm run dev -- --turbopack --hostname 0.0.0.0 --port 3000;
        fi;
        exec env NODE_ENV=production npm run start -- --hostname 0.0.0.0 --port 3000
      '
    volumes:
      - .:/app
      - tecnolts_node_modules:/app/node_modules
      - tecnolts_next_build:/app/.next
    tmpfs:
      - /app/.next/dev:size=1536m,mode=1777
      - /app/.next/cache:size=768m,mode=1777
    ports:
      - "${DEV_PORT:-3009}:3000"
    container_name: tecnolts-app-dev
    hostname: tecnolts-app-dev
    networks:
      edge:
        aliases:
          - tecnolts-app
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const socket=net.connect({host:'127.0.0.1',port:3000});socket.on('connect',()=>{socket.end();process.exit(0)});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),1500)"]
      interval: 30s
      timeout: 3s
      retries: 6
      start_period: 20s

networks:
  edge:
    external: true
    name: edge

volumes:
  tecnolts_node_modules:
  tecnolts_next_build:
