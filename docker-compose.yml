services:
  web:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        BUILD_MAX_OLD_SPACE_SIZE: ${BUILD_MAX_OLD_SPACE_SIZE:-1024}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      APP_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://tecnolts.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_TLS_SERVERNAME: ${SMTP_TLS_SERVERNAME:-}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
    ports:
      - "${HOST_PORT:-3008}:3000"
    container_name: tecnolts-app
    hostname: tecnolts-app
    networks:
      edge:
        aliases:
          - tecnolts-app
      webserver_default:
        aliases:
          - tecnolts-app
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web-dev:
    profiles: ["development"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      APP_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3009}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_TLS_SERVERNAME: ${SMTP_TLS_SERVERNAME:-}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${DEV_PORT:-3009}:3000"
    container_name: tecnolts-app-dev
    hostname: tecnolts-app-dev
    networks:
      edge:
        aliases:
          - tecnolts-app
      webserver_default:
        aliases:
          - tecnolts-app

networks:
  edge:
    external: true
    name: edge
  webserver_default:
    external: true
    name: webserver_default
