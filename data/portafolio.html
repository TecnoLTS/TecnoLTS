<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TecnoLTS - Portafolio</title>
<style>
  :root {
    --bg: #eef4f6;
    --panel: rgba(255, 255, 255, 0.88);
    --ink: #0e3a47;
    --muted: #4f6470;
    --teal: #1c6c87;
    --line: rgba(14, 58, 71, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #f7fbfd 0%, var(--bg) 100%); font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color: var(--ink); }
  #stage { position: fixed; inset: 0; width: 100vw; height: 100vh; border: 0; display: block; background: #fff; }
  .loading { position: fixed; inset: 0; display: grid; place-items: center; padding: 24px; background: linear-gradient(180deg, #f7fbfd 0%, var(--bg) 100%); transition: opacity 180ms ease, visibility 180ms ease; z-index: 2; }
  .loading.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loading-card { display: grid; gap: 10px; justify-items: center; width: min(100%, 360px); padding: 28px 24px; border: 1px solid var(--line); border-radius: 20px; background: var(--panel); box-shadow: 0 18px 50px rgba(14, 58, 71, 0.08); text-align: center; }
  .spinner { width: 42px; height: 42px; border-radius: 999px; border: 3px solid rgba(28, 108, 135, 0.18); border-top-color: var(--teal); animation: spin 0.9s linear infinite; }
  .loading strong { font-size: 1.05rem; }
  .loading span { color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loading" id="loading" aria-live="polite">
  <div class="loading-card">
    <div class="spinner" aria-hidden="true"></div>
    <strong>Abriendo portafolio</strong>
    <span>Cargando la presentación de TecnoLTS...</span>
  </div>
</div>
<iframe id="stage" title="TecnoLTS" loading="eager"></iframe>
<script>
const DOCS = {
  "Portafolio TecnoLTS.html": "/portafolio-docs/portafolio-tecnolts.html",
  "Presentación Backups.html": "/portafolio-docs/presentacion-backups.html",
  "Presentación Ciberseguridad.html": "/portafolio-docs/presentacion-ciberseguridad.html",
  "Presentación Data Center.html": "/portafolio-docs/presentacion-data-center.html",
  "Presentación Desarrollo de Software.html": "/portafolio-docs/presentacion-desarrollo-de-software.html",
  "Presentación ISO 27001.html": "/portafolio-docs/presentacion-iso-27001.html",
  "Presentación Licenciamiento.html": "/portafolio-docs/presentacion-licenciamiento.html",
  "Presentación Monitoreo.html": "/portafolio-docs/presentacion-monitoreo.html",
  "Presentación Recuperación ante Desastres.html": "/portafolio-docs/presentacion-recuperacion-ante-desastres.html",
  "Presentación Redes.html": "/portafolio-docs/presentacion-redes.html"
};
const START = "Portafolio TecnoLTS.html";
const stage = document.getElementById('stage');
const loading = document.getElementById('loading');

function nfc(value) {
  return value && value.normalize ? value.normalize('NFC') : value;
}

function appendHash(url, hash) {
  const cleanHash = (hash || '').replace(/^#/, '');
  return cleanHash ? `${url}#${cleanHash}` : url;
}

function setLoading(visible) {
  loading.classList.toggle('is-hidden', !visible);
  document.body.setAttribute('aria-busy', visible ? 'true' : 'false');
}

function resolve(href) {
  if (!href) return null;
  let raw = href.split('#')[0].split('?')[0];
  try {
    raw = decodeURIComponent(raw);
  } catch (error) {
    // Ignorar hrefs mal codificados y seguir con el valor original.
  }
  raw = nfc(raw);
  let key;
  for (key in DOCS) {
    if (nfc(key) === raw) return key;
  }
  const base = raw.split('/').pop();
  for (key in DOCS) {
    if (nfc(key.split('/').pop()) === base) return key;
  }
  return null;
}

function show(name, hash) {
  const target = DOCS[name];
  if (!target) return;
  setLoading(true);
  stage.src = appendHash(target, hash);
}

stage.addEventListener('load', function () {
  try {
    const frameTitle = stage.contentDocument && stage.contentDocument.title;
    if (frameTitle) document.title = `${frameTitle} | TecnoLTS`;
  } catch (error) {
    // El iframe es same-origin, pero no bloquear si algo externo cambiara eso.
  }
  setLoading(false);
});

window.addEventListener('message', function (event) {
  const data = event.data;
  if (!data || typeof data.tlNav !== 'string') return;
  const key = resolve(data.tlNav);
  if (!key) return;
  const hashIndex = data.tlNav.indexOf('#');
  const hash = hashIndex >= 0 ? data.tlNav.slice(hashIndex + 1) : '';
  show(key, hash);
});

show(START, window.location.hash.slice(1));
</script>
</body>
</html>
